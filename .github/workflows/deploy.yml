name: deploy

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            cibw_build: >-
              cp39-manylinux_x86_64
              cp310-manylinux_x86_64
              cp311-manylinux_x86_64
              cp312-manylinux_x86_64
              cp313-manylinux_x86_64
            # HACK: download TBB from official release
            cibw_before_all: >-
              yum clean all ;
              yum check ;
              yum erase apf ;
              yum update ca-certificates ;
              yum upgrade ;
              yum install -v -y tbb wget ;
              mkdir /tbb/ ;
              wget https://github.com/oneapi-src/oneTBB/releases/download/v2020.2/tbb-2020.2-lin.tgz -O /tbb/tbb.tar.gz ;
              cd /tbb/ ;
              tar -xzvf tbb.tar.gz ;
              pip install scikit-build-core numpy
          - runner: ubuntu-24.04-arm
            arch: aarch64
            cibw_build: >-
              cp39-manylinux_aarch64
              cp310-manylinux_aarch64
              cp311-manylinux_aarch64
              cp312-manylinux_aarch64
              cp313-manylinux_aarch64
            # manylinux_2_28 (AlmaLinux 8) ships tbb-devel for aarch64
            cibw_before_all: "dnf install -y tbb-devel && pip install scikit-build-core numpy"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: install-deps
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - uses: pypa/cibuildwheel@v2.19.2
      with:
        output-dir: wheelhouse
      env:
        CIBW_BEFORE_ALL: ${{ matrix.cibw_before_all }}
        CIBW_BEFORE_BUILD: "python -m pip install scikit-build-core numpy cmake ninja -v"
        CIBW_BUILD_VERBOSITY: '1'
        CIBW_ARCHS_LINUX: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.cibw_build }}
        CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64
        CIBW_REPAIR_WHEEL_COMMAND: 'auditwheel repair -w {dest_dir} {wheel}'
        CIBW_ENVIRONMENT: 'CMAKE_POLICY_VERSION_MINIMUM=3.5'
    - uses: actions/upload-artifact@v4
      with:
        name: bdist-manylinux-${{ matrix.arch }}
        path: wheelhouse/*

  upload:
    needs: build
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: bdist-manylinux-*
        path: wheelhouse
        merge-multiple: true
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: upload Release
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        pip install twine
        twine upload wheelhouse/*
    - uses: actions/upload-artifact@v4
      with:
        name: bdist-all
        path: wheelhouse/*
